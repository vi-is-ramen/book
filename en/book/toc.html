<!DOCTYPE HTML>
<html lang="en" class="light" dir="ltr">
    <head>
        <!-- sidebar iframe generated using mdBook

        This is a frame, and not included directly in the page, to control the total size of the
        book. The TOC contains an entry for each page, so if each page includes a copy of the TOC,
        the total size of the page becomes O(n**2).

        The frame is only used as a fallback when JS is turned off. When it's on, the sidebar is
        instead added to the main page by `toc.js` instead. The JavaScript mode is better
        because, when running in a `file:///` URL, the iframed page would not be Same-Origin as
        the rest of the page, so the sidebar and the main page theme would fall out of sync.
        -->
        <meta charset="UTF-8">
        <meta name="robots" content="noindex">
        <!-- Custom HTML head -->
        <style>
            .lang-switcher {
                float: right;
                margin-right: 15px;
                display: flex;
                align-items: center;
                height: var(--menu-bar-height);
                font-family: sans-serif;
            }
            .lang-switcher a {
                color: var(--icons);
                text-decoration: none;
                padding: 0 8px;
                font-weight: 500;
                opacity: 0.4;
                transition: opacity 0.2s;
            }
            .lang-switcher a.active {
                opacity: 1;
                font-weight: bold;
                color: var(--links);
            }
            .lang-switcher a:hover {
                opacity: 0.9;
            }
        </style>
        
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var menuBar = document.querySelector(".menu-bar-left");
                if (menuBar) {
                    var switcher = document.createElement("div");
                    switcher.className = "lang-switcher";
                    
                    var isRu = window.location.pathname.includes("/ru/");
                    
                    switcher.innerHTML = `
                        <a href="../en/index.html" class="${!isRu ? 'active' : ''}">EN</a>
                        <span style="color: var(--icons); opacity: 0.3;">|</span>
                        <a href="../ru/index.html" class="${isRu ? 'active' : ''}">RU</a>
                    `;
                    
                    menuBar.parentNode.insertBefore(switcher, menuBar.nextSibling);
                }
            });
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#ffffff">
        <link rel="stylesheet" href="css/variables-8adf115d.css">
        <link rel="stylesheet" href="css/general-0392ca55.css">
        <link rel="stylesheet" href="css/chrome-fc474251.css">
        <link rel="stylesheet" href="css/print-9e4910d8.css" media="print">
        <!-- Fonts -->
        <link rel="stylesheet" href="fonts/fonts-9644e21d.css">
        <!-- Custom theme stylesheets -->
    </head>
